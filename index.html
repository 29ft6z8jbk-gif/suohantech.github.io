<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海索涵智能科技有限公司 - 互惠双赢·合作创新</title>
    <style>
        /* ================= 全局样式 ================= */
        :root { --main-black: #000; --main-white: #fff; --text-gray: #666; --bg-gray: #f9f9f9; --accent-yellow: #eebd48; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.8; }
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; height: auto; display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { text-align: center; font-size: 32px; font-weight: normal; margin-bottom: 50px; position: relative; }
        .section-title::after { content: ''; display: block; width: 40px; height: 3px; background: #999; margin: 15px auto 0; }
        section { padding: 80px 0; }

        /* ================= 导航栏 (包含Logo优化) ================= */
        nav { background-color: var(--main-black); color: var(--main-white); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; height: 70px; font-size: 15px; }
        
        /* Logo 样式 */
        .logo-container { display: flex; align-items: center; }
        .logo-container img { height: 60px; max-width: 300px; object-fit: contain; }
        
        /* 中间导航链接样式 */
        .nav-links { display: flex; gap: 40px; }
        .nav-links a:hover { color: #aaa; }
        
        /* 右侧语言切换样式 */
        .lang-switch { color: var(--accent-yellow); font-weight: bold; min-width: 60px; text-align: right; }

        /* ================= 首屏 Banner ================= */
        .hero { background: linear-gradient(135deg, #111 0%, #2a1b38 50%, #111 100%); color: var(--main-white); text-align: center; padding: 150px 20px; position: relative; }
        .hero h1 { font-size: 48px; letter-spacing: 5px; margin-bottom: 10px; font-weight: normal; }
        .hero p { font-size: 24px; font-weight: 300; letter-spacing: 2px; }

        /* ================= 关于我们 ================= */
        .about-text { text-align: justify; margin-bottom: 40px; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .about-list p { margin-bottom: 15px; font-size: 14px; color: var(--text-gray); }

        /* ================= 发展历程 ================= */
        .history-section { background: var(--main-white); text-align: center; padding-top: 60px; }
        .history-title { font-size: 28px; margin-bottom: 10px; font-weight: normal; }
        .history-subtitle { font-size: 14px; color: #888; margin-bottom: 40px; }
        .tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 50px; border-bottom: 1px solid #eee; }
        .tab { padding: 15px 30px; cursor: pointer; color: #666; transition: all 0.3s; }
        .tab.active { background-color: var(--accent-yellow); color: #000; font-weight: bold; }
        .history-content { padding: 40px 0; position: relative; }
        .history-year { font-size: 48px; font-weight: bold; color: #333; position: relative; z-index: 2; margin-bottom: 20px; }
        .history-year-bg { font-size: 120px; font-weight: bold; color: #f5f5f5; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 1; user-select: none; }
        .history-desc { position: relative; z-index: 2; font-size: 16px; color: #555; }

        /* ================= 服务领域 ================= */
        .services-bg { background-color: var(--bg-gray); }
        .service-item { display: flex; gap: 30px; margin-bottom: 40px; border-bottom: 1px dashed #ddd; padding-bottom: 40px; }
        .service-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        
        /* ---------- 核心修复区域：强制图片大小统一且不变形 ---------- */
        .service-img { 
            width: 280px !important; 
            height: 180px !important; 
            flex: 0 0 280px !important; 
            object-fit: cover !important; 
            border-radius: 8px; 
            background: #e0e0e0; 
        }
        /* -------------------------------------------------------- */

        .service-content h3 { font-size: 18px; margin: 0 0 15px 0; font-weight: bold; }
        .service-content p { margin: 0; font-size: 14px; color: #666; text-align: justify; }

        /* ================= 客户案例 ================= */
        .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 40px; }
        .case-card { background: var(--main-white); border: 1px solid #eee; text-align: center; transition: transform 0.3s ease; border-radius: 8px; overflow: hidden; }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .case-img { width: 100%; height: 200px; object-fit: cover; background: #e0e0e0; }
        .case-info { padding: 20px; }
        .case-info h4 { margin: 0 0 10px 0; font-size: 18px; font-weight: normal; }
        .case-info p { margin: 0; font-size: 12px; color: #888; }

        /* ================= 联系我们 ================= */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .contact-info h3 { font-size: 18px; margin-bottom: 20px; font-weight: normal; }
        .form-group { margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        textarea.form-control { height: 120px; resize: vertical; }
        .btn-submit { background: #6fa8dc; color: #fff; border: none; padding: 12px 30px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .btn-submit:hover { background: #5a8ec0; }

        /* ================= 页脚 ================= */
        footer { background: #1a1a1a; color: #888; text-align: center; padding: 40px 20px; font-size: 13px; }
        footer p { margin: 5px 0; }

        /* ================= 响应式调整 ================= */
        @media (max-width: 768px) {
            .nav-inner { flex-direction: column; height: auto; padding: 15px; gap: 15px; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
            .lang-switch { text-align: center; }
            .about-grid, .contact-grid { grid-template-columns: 1fr; }
            .cases-grid { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; }
            .tab { padding: 10px 20px; width: 33.33%; box-sizing: border-box; text-align: center; }
